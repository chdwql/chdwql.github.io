title: Malvo's Blog
author: Malvo
email: devilmares@gmail.com
description: >-
  先完成，再完美。
baseurl: ""
url: "https://chdwql.github.io"

# Theme settings
remote_theme: patdryburgh/hitchens

# Hitchens specific settings
show_excerpts: true
excerpt_length: 20
paginate: 20
paginate_path: "/page:num"

plugins:
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-paginate

# Build settings
future: true

# Exclude from processing.
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
