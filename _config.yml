title: Blog · Malvo
author: Malvo
email: devilmares@gmail.com
description: >-
  先完成，再完美。
baseurl: ""
url: "https://chdwql.github.io"

# 全局顶部导航栏配置。格式："名称=跳转链接"，名称和跳转链接之间用"="分隔。
nav:
  - About=/about.html
  - TAGS=/tags.html
  - RSS=/feed.xml
  - SEARCH=/search.html

# 插件配置
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives

# 根据tag生成页面
jekyll-archives:
  enabled: ['tags']
  layout: tag_post_list
  permalinks:
    tag: '/tags/:name.html'

# 允许显示未来日期的文章
future: true

# 忽略临时文件
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .git/
  - README.md
