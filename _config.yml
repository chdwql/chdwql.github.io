title: Malvo's Blog
author: Malvo
email: devilmares@gmail.com
description: >-
  先完成，再完美。
baseurl: ""
url: "https://chdwql.github.io"

# 使用 GitHub Pages 官方原生支持的 Minima 主题
theme: minima

# Minima 配置
header_pages:
  - about.md

# 插件配置
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# 允许显示未来日期的文章
future: true

# 忽略临时文件
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
